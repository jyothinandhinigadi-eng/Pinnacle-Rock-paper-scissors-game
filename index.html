<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Rock Paper Scissors</h1>

        <div class="choices">
            <button class="choice" data-choice="rock">✊ Rock</button>
            <button class="choice" data-choice="paper">✋ Paper</button>
            <button class="choice" data-choice="scissors">✌ Scissors</button>
        </div>

        <div class="result">
            <p id="user-choice">Your Choice: </p>
            <p id="computer-choice">Computer Choice: </p>
            <h2 id="winner">Choose an option!</h2>
        </div>

        <div class="score-board">
            <div>
                <h3>You</h3>
                <p id="user-score">0</p>
            </div>

            <div>
                <h3>Computer</h3>
                <p id="computer-score">0</p>
            </div>
        </div>

        <button id="reset-btn">Reset Game</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
